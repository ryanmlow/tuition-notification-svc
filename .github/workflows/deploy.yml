name: Deploy to Lambda

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up SAM CLI
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-southeast-1

      - name: Sync SSM parameters
        env:
          API_ID: ${{ secrets.TELEGRAM_API_ID }}
          API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          USER_ID: ${{ secrets.TELEGRAM_USER_ID }}
          SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
        run: |
          aws ssm put-parameter --name "/tuition-notifier/api_id"         --value "$API_ID"         --type SecureString --overwrite
          aws ssm put-parameter --name "/tuition-notifier/api_hash"        --value "$API_HASH"        --type SecureString --overwrite
          aws ssm put-parameter --name "/tuition-notifier/bot_token"       --value "$BOT_TOKEN"       --type SecureString --overwrite
          aws ssm put-parameter --name "/tuition-notifier/user_id"         --value "$USER_ID"         --type SecureString --overwrite
          aws ssm put-parameter --name "/tuition-notifier/session_string"  --value "$SESSION_STRING"  --type SecureString --overwrite

      - name: Build
        run: sam build

      - name: Deploy
        run: sam deploy --no-confirm-changeset
