AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31

Description: Tuition notification service - polls Telegram channels daily for programming keyword matches

Globals:
  Function:
    Runtime: python3.12
    Timeout: 300
    MemorySize: 256

Resources:
  TuitionNotifierFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: lambda_handler.lambda_handler
      Description: Polls Telegram channels for tuition job postings matching programming keywords
      Policies:
        - Statement:
            Effect: Allow
            Action: ssm:GetParameters
            Resource: !Sub 'arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/tuition-notifier/*'
      Events:
        DailySchedule:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: cron(0 1 * * ? *)
            Description: Daily poll at 9 AM SGT (1 AM UTC)
            State: ENABLED

Outputs:
  FunctionName:
    Value: !Ref TuitionNotifierFunction
